<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space War : Shooting - 2D Phaser Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- Load Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-gamepad"></i> SPACE WAR : SHOOTING</h1>
        <p>Kendalikan pesawat tempur, hancurkan alien penyerang dengan laser!</p>
    </div>

    <div class="game-container">
        <!-- Dashboard Stats -->
        <div class="game-info">
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">SKOR</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">NYAWA</span>
                    <span class="stat-value" id="lives">3</span>
                </div>
                <div class="stat">
                    <span class="stat-label">LEVEL</span>
                    <span class="stat-value" id="level">1</span>
                </div>
            </div>
            
            <div class="controls-info">
                <div>Kontrol: <span>WASD / Arrow Keys</span></div>
                <div>Tembak: <span>SPACE / Klik</span></div>
                <div id="fireRateInfo" style="color: #ffaa00; font-weight: bold; margin-top: 4px;">Laser: Normal</div>
            </div>
        </div>

        <!-- Phaser Game Mount Point -->
        <div class="canvas-wrapper" id="game-parent"></div>

        <!-- Dashboard Action Buttons -->
        <div class="game-buttons">
            <button class="btn btn-start" id="startButton">
                <i class="fas fa-play"></i> Mulai Game
            </button>
            <button class="btn btn-pause" id="pauseButton">
                <i class="fas fa-pause"></i> Jeda
            </button>
            <button class="btn btn-restart" id="resetButton">
                <i class="fas fa-redo"></i> Ulangi
            </button>
        </div>

        <!-- Mobile Touch Controllers -->
        <div class="mobile-controls">
            <div class="mobile-dpad">
                <div class="mobile-btn" id="upBtn"><i class="fas fa-chevron-up"></i></div>
                <div class="mobile-btn" id="leftBtn"><i class="fas fa-chevron-left"></i></div>
                <div class="mobile-btn" id="rightBtn"><i class="fas fa-chevron-right"></i></div>
                <div class="mobile-btn" id="downBtn"><i class="fas fa-chevron-down"></i></div>
            </div>
            <div class="mobile-actions">
                <div class="shoot-btn" id="shootBtn"><i class="fas fa-crosshairs"></i></div>
            </div>
        </div>
    </div>


    <!-- Load game logic -->
    <script src="game.js"></script>
</body>
</html>
